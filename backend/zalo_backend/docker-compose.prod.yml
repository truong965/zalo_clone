# Production Docker Compose for EC2 Deployment
# Storage: AWS S3 (bucket: zalo-clone-media-production, region: ap-southeast-1)
# Queue:   AWS SQS (QUEUE_PROVIDER=sqs)
# Auth:    IAM Instance Profile attached to EC2 — no explicit AWS credentials needed

services:
  # 1. Zalo Backend API
  api:
    image: trungmai965/zalo_backend:latest
    container_name: zalo_api_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Redis — app reads REDIS_HOST/PORT/PASSWORD separately (not REDIS_URL)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      # JWT — app reads ACCESS + REFRESH secrets separately (not JWT_SECRET)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-100d}
      # ── AWS S3 (native, no MinIO) ──────────────────────────────────────────
      # S3_ENDPOINT is intentionally absent → SDK uses native S3 endpoint
      # AWS credentials are resolved from the EC2 IAM Instance Profile automatically
      # Do NOT set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY here
      S3_BUCKET_NAME: zalo-clone-media-production
      AWS_REGION: ap-southeast-1
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      # ── AWS SQS ────────────────────────────────────────────────────────────
      QUEUE_PROVIDER: sqs
      SQS_IMAGE_QUEUE_URL: ${SQS_IMAGE_QUEUE_URL}
      SQS_IMAGE_DLQ_URL: ${SQS_IMAGE_DLQ_URL:-}
      SQS_VIDEO_QUEUE_URL: ${SQS_VIDEO_QUEUE_URL}
      SQS_VIDEO_DLQ_URL: ${SQS_VIDEO_DLQ_URL:-}
      SQS_VISIBILITY_TIMEOUT_IMAGE: ${SQS_VISIBILITY_TIMEOUT_IMAGE:-120}
      SQS_VISIBILITY_TIMEOUT_VIDEO: ${SQS_VISIBILITY_TIMEOUT_VIDEO:-900}
      SQS_WAIT_TIME: ${SQS_WAIT_TIME:-20}
      # WebRTC / TURN
      STUN_SERVER_URL: ${STUN_SERVER_URL:-stun:stun.l.google.com:19302}
      TURN_SERVER_URL: ${TURN_SERVER_URL}
      TURN_SECRET: ${TURN_SECRET}
      TURN_CREDENTIAL_TTL: ${TURN_CREDENTIAL_TTL:-43200}
      DEFAULT_ICE_TRANSPORT_POLICY: relay
      # Firebase Push Notifications
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      # CORS / App
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Port 3000 not exposed — nginx handles external traffic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 2. PostgreSQL Database
  postgres:
    image: postgres:18.1-alpine
    container_name: zalo_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # Remove port mapping in production for security
    # Internal communication only within Docker network

    # 3. Redis Cache
  redis:
    image: redis:8.4-alpine
    container_name: zalo_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    # Remove port mapping in production

    # 4. Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: zalo_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
  # NOTE: MinIO removed — media storage moved to AWS S3 (bucket: zalo-clone-media-production)
  # NOTE: S3 bucket + lifecycle rules must be pre-created in AWS Console.
  #       See doc/plan/MINIO-BULL-TO-S3-SQS-MIGRATION.md Phase 1 for setup steps.

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    driver: bridge
