name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/zalo_backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  # ───────────────────────────────────────────────
  # JOB 1: Build & Push Docker image to Docker Hub
  # ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: trungmai965/zalo_backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/zalo_backend
          file: ./backend/zalo_backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/zalo_backend

            echo ">>> Pulling latest image..."
            docker compose -f docker-compose.prod.yml pull api

            echo ">>> Running database migrations..."
            source .env
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
              api npx prisma migrate deploy

            echo ">>> Restarting api service..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate api

            echo ">>> Waiting for health check..."
            sleep 15
            curl -f https://api.zaloclone.me/api/v1/health || \
              (echo "Health check failed!" && docker compose -f docker-compose.prod.yml logs --tail=50 api && exit 1)

            echo ">>> Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy completed successfully!"
