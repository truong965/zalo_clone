name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/zalo_backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  # ───────────────────────────────────────────────
  # JOB 1: Build & Push Docker image to Docker Hub
  # ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: trungmai965/zalo_backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/zalo_backend
          file: ./backend/zalo_backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Checkout cần thiết để runner có file config cho bước SCP bên dưới
      - name: Checkout code
        uses: actions/checkout@v4

      # ── [Cách A] Copy config files thẳng từ runner lên EC2 via SCP ──────
      # Runner đã có code sau bước checkout → không cần git trên EC2
      - name: Copy config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/zalo_backend/docker-compose.prod.yml,backend/zalo_backend/nginx.conf"
          target: "~/zalo_backend/"
          strip_components: 2   # bỏ tiền tố "backend/zalo_backend/" → file vào thẳng ~/zalo_backend/

      # ── [Cách X + Deploy] EC2 tự sinh .env từ SSM rồi restart ───────────
      # EC2 dùng IAM Instance Profile (không cần AWS key riêng) để đọc SSM.
      # Mọi env var được quản lý tại AWS SSM Parameter Store path /zalo/prod/*.
      # Khi cần thêm/sửa var: chạy `aws ssm put-parameter` trên local, không cần SSH vào EC2.
      # Xem hướng dẫn đầy đủ tại: backend/zalo_backend/CI-CD-GUIDE.md
      - name: Generate .env from SSM & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/zalo_backend

            echo ">>> Generating .env from SSM Parameter Store..."
            aws ssm get-parameters-by-path \
              --path "/zalo/prod/" \
              --with-decryption \
              --recursive \
              --region ap-southeast-1 \
              --output json \
              --query "Parameters[*].{Name:Name,Value:Value}" | \
            python3 -c "
            import json, sys
            params = json.load(sys.stdin)
            for p in params:
                key = p['Name'].split('/')[-1]
                val = p['Value'].replace('\n', '\\\\n')
                print(f'{key}={val}')
            " > .env
            echo "  ✅ .env regenerated ($(wc -l < .env) parameters from SSM)"

            echo ">>> Pulling latest Docker image..."
            docker compose -f docker-compose.prod.yml pull api

            echo ">>> Running database migrations..."
            source .env
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}" \
              api npx prisma migrate deploy

            echo ">>> Restarting api service..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate api

            echo ">>> Waiting for health check..."
            sleep 15
            curl -f https://api.zaloclone.me/api/v1/health || \
              (echo "Health check failed!" && docker compose -f docker-compose.prod.yml logs --tail=50 api && exit 1)

            echo ">>> Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy completed successfully!"
